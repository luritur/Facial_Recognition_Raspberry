{% extends "base.html" %}

{% block title %}Dashboard - Fichaje de Empleados{% endblock %}

{% block extra_css %}
<style>
    .header-section {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        margin-bottom: 30px;
    }
    .header-section h2 {
        margin: 0;
        color: #2c3e50;
        font-weight: 600;
    }
    .filters-bar {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: center;
    }
    .filters-bar select, .filters-bar input {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 8px 15px;
    }
    .employee-table {
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        overflow: hidden;
    }
    .table {
        margin: 0;
    }
    .table thead {
        background-color: #f8f9fa;
    }
    .table th {
        border: none;
        color: #6c757d;
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        padding: 15px;
    }
    .table td {
        border-top: 1px solid #f0f0f0;
        padding: 15px;
        vertical-align: middle;
    }
    .employee-info {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .employee-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
    }
    .employee-name {
        font-weight: 600;
        color: #2c3e50;
        margin: 0;
    }
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 500;
    }
    .status-online {
        background-color: #d4edda;
        color: #155724;
    }
    .status-online::before {
        content: '';
        width: 8px;
        height: 8px;
        background-color: #28a745;
        border-radius: 50%;
    }
    .progress-bar-custom {
        height: 8px;
        border-radius: 4px;
        background-color: #e9ecef;
        position: relative;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.3s;
    }
    .time-display {
        font-size: 0.9rem;
        color: #6c757d;
    }
    .task-badge {
        background-color: #e9ecef;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.85rem;
        color: #495057;
    }
    .completion-text {
        font-weight: 600;
        color: #2c3e50;
    }
</style>
{% endblock %}

{% block content %}
<div class="header-section">
    <h2>Empleados</h2>
</div>

<div class="filters-bar">
    <select class="form-select" style="width: auto;">
        <option>Centro</option>
    </select>
    <select class="form-select" style="width: auto;">
        <option>Departamento</option>
    </select>
    <button class="btn btn-light">
        <i class="bi bi-three-dots-vertical"></i>
    </button>
    <input type="search" class="form-control" placeholder="Buscar" style="max-width: 300px; margin-left: auto;">
    <button class="btn btn-outline-secondary">Configuración gráf.</button>
</div>

<div class="employee-table">
    <!-- Tabla -->
    <table id="tablaEmpleados" class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Nombre Empleado</th>
                <th>Email</th>
                <th>Jornada (horas)</th>
                <th>Progreso</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody>
            <!-- Fila vacía estática -->
            <tr>
                <td colspan="5" class="text-center text-muted">No hay empleados registrados aún...</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();  

// Función para limpiar la fila vacía
function limpiarFilaVacia() {
    const tbody = document.querySelector("#tablaEmpleados tbody");
    if (tbody.children.length === 1 &&
        tbody.children[0].children[0].colSpan === 5) {
        tbody.innerHTML = "";
    }
}

// Función para agregar un empleado
function agregarEmpleado(nombre, email, jornada, horas, estado) {
    limpiarFilaVacia();
    const tbody = document.querySelector("#tablaEmpleados tbody");
    const fila = document.createElement("tr");

    const progreso = Math.min((horas / jornada) * 100, 100);
    let color = "gray";
    if (estado === "trabajando") color = "yellow";
    if (estado === "no_entro") color = "red";
    if (estado === "completado") color = "green";

    fila.innerHTML = `
        <td>${nombre}</td>
        <td>${email}</td>
        <td>${jornada}</td>
        <td>
            <div style="width:100%; background:#e5e5e5; border-radius:6px;">
                <div style="width:${progreso}%; height:12px; background:#007bff; border-radius:6px;"></div>
            </div>
            <small>${horas}/${jornada} h</small>
        </td>
        <td><span style="display:inline-block;width:16px;height:16px;background:${color};border-radius:50%;border:1px solid #555;"></span></td>
    `;
    tbody.appendChild(fila);
}

// Función para actualizar un empleado
function actualizarEmpleado(email, horas, estado) {
    const tbody = document.querySelector("#tablaEmpleados tbody");
    for (let fila of tbody.rows) {
        if (fila.cells[1].textContent === email) {
            const jornada = parseFloat(fila.cells[2].textContent);
            const progreso = Math.min((horas / jornada) * 100, 100);
            fila.cells[3].innerHTML = `
                <div style="width:100%; background:#e5e5e5; border-radius:6px;">
                    <div style="width:${progreso}%; height:12px; background:#007bff; border-radius:6px;"></div>
                </div>
                <small>${horas}/${jornada} h</small>
            `;
            let color = "gray";
            if (estado === "trabajando") color = "yellow";
            if (estado === "no_entro") color = "red";
            if (estado === "completado") color = "green";
            fila.cells[4].innerHTML = `<span style="display:inline-block;width:16px;height:16px;background:${color};border-radius:50%;border:1px solid #555;"></span>`;
            break;
        }
    }
}


socket.on("connect", () => {
    console.log("✅ Conectado al servidor Socket.IO!");
});
socket.on("disconnect", () => {
    console.log("❌ Desconectado del servidor!");
});


// SocketIO: eventos desde el backend
socket.on('nuevo_empleado', (data) => {
    console.log('🆕 [EVENTO] "nuevo_empleado" recibido:', data);
    agregarEmpleado(data.nombre, data.email, data.jornada, data.horas, data.estado);
});

socket.on('empleado_actualizado', (data) => {
    console.log('♻️ [EVENTO] "empleado_actualizado" recibido:', data);
    actualizarEmpleado(data.email, data.horas, data.estado);
});
</script>
{% endblock %}
